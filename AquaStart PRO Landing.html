a] = useState({ day: 46, ph: '', nh3: '', no2: '', no3: '', po4: '' });            const getAlerts = (m) => {                let a = []; const { day, ph, nh3, no2, no3, po4 } = m;                if (nh3 >= 0.5) a.push({ type: 'alarm', param: 'NH3 (Amoniak)', msg: `KRYTYCZNIE (${nh3} mg/l)! ${ph>=7.5?'Wysokie pH potęguje toksyczność!':''} Podmień 50% wody i natleniaj.` });                else if (nh3 > 0) { if(day<=14) a.push({ type: 'warning', param: 'NH3 (Start)', msg: `Trwa dojrzewanie. ZAKAZ wpuszczania ryb.` }); else a.push({ type: 'warning', param: 'NH3 (Awaria)', msg: "Amoniak w dojrzałym zbiorniku! Sprawdź filtr." }); }                if (no2 >= 1.0) a.push({ type: 'alarm', param: 'NO2 (Azotyny)', msg: `Toksyczność krwi! Podaj bakterie startowe i natleniaj.` });                if (no3 !== null && po4 !== null && po4 > 0) { const r = no3/po4; if(r>15) a.push({ type: 'warning', param: 'REDFIELD (GSA)', msg: `Niedobór fosforu. Ryzyko Zielenic.` }); else if(r<=5) a.push({ type: 'warning', param: 'REDFIELD (Sinice)', msg: `Nadmiar fosforu. Ryzyko Sinic.` }); }                if (a.length === 0) a.push({ type: 'success', param: 'LSS Stabilny', msg: "System podtrzymywania życia w rygorze bezpiecznym." });                return a;            };            const handleSimulate = (e) => {                e.preventDefault();                try {                    const d=parseInt(formData.day), p=parseFloat(formData.ph), n=parseFloat(formData.nh3), n2=parseFloat(formData.no2), n3=parseFloat(formData.no3), p4=parseFloat(formData.po4);                    if ([d,p,n,n2,n3,p4].some(isNaN)) { alert("Błąd walidacji: Wprowadź prawidłowe dane liczbowe."); return; }                    if ([d,p,n,n2,n3,p4].some(v => v < 0)) { alert("Błąd bezpieczeństwa: Wartości nie mogą być ujemne."); return; }                    const newM = { id: Date.now(), day: d, ph: p, nh3: n, no2: n2, no3: n3, po4: p4 };                    setMeasurements([newM, ...measurements]); setFo
